<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Feedback - Code Native</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .feedback-container {
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }

        .feedback-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--card-shadow);
            animation: cardEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardEnter {
            0% { transform: translateY(40px) rotateX(-10deg); opacity: 0; }
            100% { transform: translateY(0) rotateX(0); opacity: 1; }
        }

        .feedback-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .feedback-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .feedback-header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1e293b;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background: #fff;
        }

        .rating-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .star-rating {
            font-size: 2.5rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .star-rating:hover, .star-rating.active {
            color: var(--accent);
            transform: scale(1.2);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Toast Styles */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 1rem 2rem;
            border-radius: 50px;
            background: #1e293b;
            color: white;
            font-weight: 600;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="feedback-container">
        <div class="feedback-card">
            <div class="feedback-header">
                <h1>We Value You!</h1>
                <p>How's your experience with Code Native?</p>
            </div>

            <div class="rating-group" id="ratingGroup">
                <i class="fas fa-star star-rating" data-rating="1"></i>
                <i class="fas fa-star star-rating" data-rating="2"></i>
                <i class="fas fa-star star-rating" data-rating="3"></i>
                <i class="fas fa-star star-rating" data-rating="4"></i>
                <i class="fas fa-star star-rating" data-rating="5"></i>
            </div>

            <form id="feedbackForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-input" value="{{ session.get('user_name', '') }}" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" value="{{ session.get('user_email', '') }}" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label class="form-label">Your Message</label>
                    <textarea id="message" class="form-textarea" rows="4" placeholder="Tell us what you liked or how we can improve..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    Send Feedback <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/" style="color: #64748b; text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let selectedRating = 0;
        const stars = document.querySelectorAll('.star-rating');
        const toast = document.getElementById('toast');

        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = parseInt(star.getAttribute('data-rating'));
                updateStars();
            });

            star.addEventListener('mouseenter', () => {
                const hoverRating = parseInt(star.getAttribute('data-rating'));
                stars.forEach((s, i) => {
                    if (i < hoverRating) s.style.color = 'var(--accent)';
                });
            });

            star.addEventListener('mouseleave', () => {
                updateStars();
            });
        });

        function updateStars() {
            stars.forEach((s, i) => {
                if (i < selectedRating) {
                    s.classList.add('active');
                    s.style.color = 'var(--accent)';
                } else {
                    s.classList.remove('active');
                    s.style.color = '#cbd5e1';
                }
            });
        }

        function showToast(message) {
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value,
                rating: selectedRating
            };

            try {
                const response = await fetch('/api/submit_feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (response.ok) {
                    showToast(result.message);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showToast(result.message);
                }
            } catch (err) {
                showToast("Connection error. Try again later.");
            }
        });
    </script>
</body>
</html>
