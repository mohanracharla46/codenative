<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tutorials | Code Native</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
    <style>
        body {
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 1;
        }

        .icon-box {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .icon-box i {
            font-size: 42px;
            color: white;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 18px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: #f1f5f9;
            color: #6366f1;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: #0f172a;
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.1);
            filter: blur(100px);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob:nth-child(2) {
            background: rgba(139, 92, 246, 0.1);
            right: -100px;
            bottom: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 26px; }
            p { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container">
        <div class="badge">Coming Soon</div>
        <div class="icon-box">
            <i class="fas fa-play-circle"></i>
        </div>
        <h1>Video Tutorials</h1>
        <p>Arey 😄! Manam super quality video tutorials ni ready chestunnam. Chala fast ga update chestham, chill bro! 🔥</p>
        <a href="/dashboard" class="btn">
            <i class="fas fa-arrow-left"></i>
            Go to Dashboard
        </a>
    </div>

    <script src="/static/chatbot.js" defer></script>
</body>
</html>
