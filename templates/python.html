<body>
    <header class="header main-tutorial-header">
        <div class="header-left">
            <button class="menu-toggle" id="sidebarToggle" aria-label="Toggle Menu">
                <i class="fas fa-bars"></i>
            </button>

        <div class="header-center">

                    <i class="fas fa-chevron-left"></i> <span>Previous</span>
                </button>
                <button class="btn-nav-control" id="nextTopic" title="Next Lesson">

        </div>

        <div class="header-right">

        </div>

    <!-- Sidebar -->
    <div class="tutorial-sidebar">
        <button class="sidebar-close" id="sidebarClose" aria-label="Close Menu">
            <i class="fas fa-times"></i>
        </button>

        <div class="sidebar-header" style="padding: 24px 20px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
            <i class="fab fa-python" style="font-size: 36px; color: #3776ab;"></i>

                <p style="font-size: 11px; margin: 0; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;">Fundamentals</p>

        </div>

        <ul id="sidebarTopics" class="sidebar-menu">
            <!-- Topics will be loaded here -->

        <div class="sidebar-footer-nav">

            </ul>
        </div>
    </div>


    <!-- Content -->
    <div class="tutorial-content">
        <div class="breadcrumb-label">Module 01 • Python Fundamentals</div>
        
        <div class="main-box" id="topicContent">
            <!-- Content from database will be loaded here -->
            <div style="padding: 100px; text-align: center; color: #94a3b8;">
                <i class="fas fa-spinner fa-spin" style="font-size: 32px; margin-bottom: 20px;"></i>
                <p>Loading lesson content...</p>
            </div>
        </div>

        {% if session.get('is_admin') %}
        <div class="admin-edit-toolbar" style="margin-top: 20px; padding: 15px; background: #fffbeb; border: 1px solid #fef3c7; border-radius: 12px; display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 10px; color: #92400e; font-size: 14px; font-weight: 600;">
                <i class="fas fa-user-shield"></i> Admin View
            </div>
            <a id="editLessonBtn" href="/admin" class="btn-nav-control" style="background: #f59e0b; color: white;">
                <i class="fas fa-edit"></i> Edit This Lesson
            </a>
        </div>
        {% endif %}

        <!-- Compiler Integrated as Interactive Playground -->
        <div class="playground-container" style="margin-top: 40px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
            <div class="playground-title-bar">
                <div class="title-left">
                    <i class="fas fa-terminal" style="margin-right: 10px; color: #a78bfa; font-size: 14px;"></i>
                    <span>INTERACTIVE PLAYGROUND</span>
                </div>
                <div class="traffic-lights">
                    <span class="light red"></span>
                    <span class="light yellow"></span>
                    <span class="light green"></span>
                </div>
            </div>

            <div class="playground-tab-bar">
                <div class="tab-item active">
                    <span class="file-name">main.py</span>
                    <div class="active-indicator"></div>
                </div>
                <div class="playground-controls">
                    <div class="lang-selector">
                        <select id="lang">
                            <option value="71" selected>Python</option>
                            <option value="62">Java</option>
                            <option value="50">C</option>
                            <option value="54">C++</option>
                            <option value="63">JavaScript</option>
                        </select>
                    </div>
                    <button id="clearBtn" class="btn-playground-clear">Clear</button>
                    <button id="runBtn" class="btn-playground-run"><i class="fas fa-play" style="font-size: 10px; margin-right: 6px;"></i> Run Code</button>
                </div>
            </div>

            <div class="editor-section-new">
                <div id="editor">print("Hello, Python Scholar!")</div>
            </div>

            <div class="playground-console">
                <div class="console-label">CONSOLE OUTPUT</div>
                <pre id="output">Press Run to execute.</pre>
            </div>
        </div>

        <!-- Next Lesson -->
        <div class="next-lesson-section" id="nextLessonBar">
            <div class="next-lesson-meta">
                <span>Coming up next</span>
                <h3>Variables & State</h3>
            </div>
            <button class="next-lesson-btn" id="nextLessonBtn">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <script>
        // Initialize Ace Editor
        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/python");
        editor.setOptions({
            fontSize: "14px",
            showPrintMargin: false,
            tabSize: 4,
            useWorker: false
        });

        // DOM
        const langSelect = document.getElementById("lang");
        const runBtn = document.getElementById("runBtn");
        const clearBtn = document.getElementById("clearBtn");
        const outputEl = document.getElementById("output-compiler");

        // change mode on language select
        langSelect.addEventListener("change", () => {
            const lang = langSelect.value;
            if (lang == "71") editor.session.setMode("ace/mode/python");
            else if (lang == "62") editor.session.setMode("ace/mode/java");
            else if (lang == "50") editor.session.setMode("ace/mode/c_cpp");
            else if (lang == "54") editor.session.setMode("ace/mode/c_cpp");
            else if (lang == "63") editor.session.setMode("ace/mode/javascript");
        });

        // Run handler
        runBtn.addEventListener("click", runCode);
        clearBtn.addEventListener("click", () => {
            outputEl.innerText = "";
        });

        // runCode: sends code to /run and shows output
        async function runCode() {
            try {
                runBtn.disabled = true;
                runBtn.innerText = "Running...";
                outputEl.innerText = "Running...";

                const code = editor.getValue();
                const language_id = langSelect.value;

                const response = await fetch("/run", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code, language_id })
                });

                const text = await response.text();
                let data;

                try {
                    data = JSON.parse(text);
                } catch (err) {
                    outputEl.innerText = `Invalid response from server:\n${text}`;
                    return;
                }

                outputEl.innerText = data.output || "No output";
            } catch (err) {
                outputEl.innerText = `Error: ${err.message}`;
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = '<i class="fas fa-play" style="font-size: 10px; margin-right: 6px;"></i> Run Code';
            }
        }
    </script>
    </div>

    <script>
        // Dynamic Content Loading
        const sidebarTopics = document.getElementById('sidebarTopics');
        const topicContentList = document.getElementById('sidebarTopics'); // reuse
        const contentBox = document.getElementById('topicContent');
        const titleBox = document.getElementById('pageTitle');
        const currentLang = 'python';

        async function loadTopics() {
            try {
                const res = await fetch(`/api/content/${currentLang}`);
                const topics = await res.json();
                
                if (topics.length > 0) {
                    sidebarTopics.innerHTML = '';
                    topics.forEach((topic, index) => {
                        const li = document.createElement('li');
                        li.className = `topic ${index === 0 ? 'active' : ''}`;
                        li.dataset.topic = topic.topic_slug;
                        li.textContent = topic.topic_title;
                        li.onclick = () => loadSpecificTopic(topic.topic_slug, li);
                        sidebarTopics.appendChild(li);
                    });
                    loadSpecificTopic(topics[0].topic_slug, sidebarTopics.firstChild);
                }
            } catch (err) { console.error(err); }
        }

        async function loadSpecificTopic(slug, el) {
            try {
                document.querySelectorAll('.topic').forEach(t => t.classList.remove('active'));
                if(el) el.classList.add('active');
                
                const res = await fetch(`/api/content/${currentLang}/${slug}`);
                const data = await res.json();
                if(data.content_html) {
                    contentBox.innerHTML = data.content_html;
                }

                // Update Next Lesson Bar
                const nextEl = el.nextElementSibling;
                const nextBar = document.getElementById('nextLessonBar');
                if(nextEl && nextEl.classList.contains('topic')) {
                    nextBar.style.display = 'flex';
                    nextBar.querySelector('h3').textContent = nextEl.textContent;
                    nextBar.onclick = () => nextEl.click();
                } else {
                    nextBar.style.display = 'none';
                }

                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch(err) { console.error(err); }
        }

        // Attach Nav Buttons
        const prevBtn = document.getElementById('prevTopic');
        const nextBtn = document.getElementById('nextTopic');
        
        if (prevBtn) {
            prevBtn.onclick = () => {
                const active = document.querySelector('.topic.active');
                if(active && active.previousElementSibling) active.previousElementSibling.click();
            };
        }
        
        if (nextBtn) {
            nextBtn.onclick = () => {
                const active = document.querySelector('.topic.active');
                if(active && active.nextElementSibling) active.nextElementSibling.click();
            };
        }

        // Mobile Menu Toggle
        const menuToggle = document.getElementById('menuToggle');
        const menuToggleMain = document.getElementById('menuToggleMain');
        const sidebar = document.querySelector('.tutorial-sidebar');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            const icon = sidebar.classList.contains('active') ? 'fa-times' : 'fa-bars';
            menuToggle.querySelector('i').className = `fas ${icon}`;
            menuToggleMain.querySelector('i').className = `fas ${icon}`;
        }

        if (menuToggle) menuToggle.onclick = toggleSidebar;
        if (menuToggleMain) menuToggleMain.onclick = toggleSidebar;

        // Close sidebar when clicking outside
        document.addEventListener('click', (e) => {
            if (sidebar.classList.contains('active')) {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target) && !menuToggleMain.contains(e.target)) {
                    sidebar.classList.remove('active');
                    menuToggle.querySelector('i').className = 'fas fa-bars';
                    menuToggleMain.querySelector('i').className = 'fas fa-bars';
                }
            }
        });

        window.addEventListener('DOMContentLoaded', loadTopics);
    </script>
    <script>
        // Sidebar Toggle for Mobile
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarClose = document.getElementById('sidebarClose');
        const sidebar = document.querySelector('.tutorial-sidebar');
        const menuIcon = sidebarToggle ? sidebarToggle.querySelector('i') : null;

        function toggleSidebar(e) {
            if(e) e.stopPropagation();
            sidebar.classList.toggle('active');
            if (menuIcon) {
                if(sidebar.classList.contains('active')) {
                    menuIcon.classList.replace('fa-bars', 'fa-times');
                } else {
                    menuIcon.classList.replace('fa-times', 'fa-bars');
                }
            }
        }

        if (sidebarToggle && sidebar) {
            sidebarToggle.addEventListener('click', toggleSidebar);
        }

        if (sidebarClose && sidebar) {
            sidebarClose.addEventListener('click', () => {
                sidebar.classList.remove('active');
                if (menuIcon) menuIcon.classList.replace('fa-times', 'fa-bars');
            });
        }

        // Close sidebar when clicking outside
        document.addEventListener('click', (e) => {
            if (sidebar && sidebar.classList.contains('active') && !sidebar.contains(e.target) && e.target !== sidebarToggle) {
                sidebar.classList.remove('active');
                if (menuIcon) menuIcon.classList.replace('fa-times', 'fa-bars');
            }
        });
    </script>
</body>
